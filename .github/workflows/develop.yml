name: Develop Branch - Build, Test & PR to Master

on:
  push:
    branches:
      - develop

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: testpassword
          MYSQL_DATABASE: testdb
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "maven"

      - name: Wait for MySQL to be ready
        run: |
          for i in {1..30}; do
            if mysqladmin ping -h 127.0.0.1 -P 3306 -u root -ptestpassword --silent 2>/dev/null; then
              echo "MySQL is ready"
              break
            fi
            echo "Waiting for MySQL... ($i/30)"
            sleep 2
          done

      - name: Make mvnw executable
        run: chmod +x mvnw

      - name: Build and run tests
        run: ./mvnw verify --no-transfer-progress
        env:
          SPRING_PROFILES_ACTIVE: dev
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_NAME: testdb
          DB_USER: root
          DB_PASSWORD: testpassword
          JWT_SECRET: ci-test-secret-key-that-is-long-enough-for-testing

      - name: Verify JAR was generated
        run: ls -la target/*.jar

  create-pr-to-master:
    name: Create PR to Master
    runs-on: ubuntu-latest
    needs: build-and-test
    if: success()
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create Pull Request to master
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          PR_TITLE="release: develop → master"
          PR_BODY="## Release PR\n\nBranch \`develop\` passou em todos os testes e está pronta para produção.\n\n**Merge para master irá disparar deploy automático no Railway.**"

          EXISTING=$(gh pr list --head develop --base master --state open --json number --jq '.[0].number')

          if [ -n "$EXISTING" ]; then
            echo "PR #$EXISTING já existe para develop → master. Pulando criação."
          else
            gh pr create \
              --title "$PR_TITLE" \
              --body "$(printf "$PR_BODY")" \
              --base master \
              --head develop
            echo "PR criado com sucesso: develop → master"
          fi
