name: Feature Branch - Build, Test & PR to Develop

on:
  push:
    branches:
      - "feature/**"

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: testpassword
          MYSQL_DATABASE: testdb
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "maven"

      - name: Wait for MySQL to be ready
        run: |
          for i in {1..30}; do
            if mysqladmin ping -h 127.0.0.1 -P 3306 -u root -ptestpassword --silent 2>/dev/null; then
              echo "MySQL is ready"
              break
            fi
            echo "Waiting for MySQL... ($i/30)"
            sleep 2
          done

      - name: Make mvnw executable
        run: chmod +x mvnw

      - name: Build and run tests
        run: ./mvnw verify --no-transfer-progress
        env:
          SPRING_PROFILES_ACTIVE: dev
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_NAME: testdb
          DB_USER: root
          DB_PASSWORD: testpassword
          JWT_SECRET: ci-test-secret-key-that-is-long-enough-for-testing

  create-pr-to-develop:
    name: Create PR to Develop
    runs-on: ubuntu-latest
    needs: build-and-test
    if: success()
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create Pull Request to develop
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          BRANCH="${{ github.ref_name }}"
          PR_TITLE="feat: merge ${BRANCH} into develop"
          PR_BODY="## Automated PR\n\nBranch \`${BRANCH}\` passou no build e testes.\n\n**Merge para develop após revisão.**"

          # Verifica se já existe um PR aberto para essa branch
          EXISTING=$(gh pr list --head "$BRANCH" --base develop --state open --json number --jq '.[0].number')

          if [ -n "$EXISTING" ]; then
            echo "PR #$EXISTING já existe para $BRANCH → develop. Pulando criação."
          else
            gh pr create \
              --title "$PR_TITLE" \
              --body "$(printf "$PR_BODY")" \
              --base develop \
              --head "$BRANCH"
            echo "PR criado com sucesso: $BRANCH → develop"
          fi
