# ===============================
# SERVER
# ===============================
server.port=${SERVER_PORT:8080}

# ===============================
# DATASOURCE
# ===============================
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}/${DB_NAME:teste_fabiano_cadastro2}?createDatabaseIfNotExist=true
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:root}

# ===============================
# JPA
# ===============================
spring.jpa.hibernate.ddl-auto=${JPA_DDL:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# FLYWAY (dev only)
# ===============================
# Limpa automaticamente entradas com falha do histórico antes de migrar.
# Necessário quando uma migration falhou a meio-caminho (ex: SQL inválido).
spring.flyway.repair-on-migrate=true