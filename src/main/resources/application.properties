spring.application.name=cadastroFabiano

spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# ===============================
# FLYWAY
# ===============================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ===============================
# JWT
# ===============================
# ATENCAO: fallback apenas para dev local. Em producao, JWT_SECRET DEVE ser definido via variavel de ambiente.
jwt.secret=${JWT_SECRET:MinhaChaveSuperSecretaMuitoForte123456}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ===============================
# CORS
# ===============================
# Em producao, defina CORS_ALLOWED_ORIGINS com a URL do seu frontend
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200}

# ===============================
# UPLOAD DE IMAGENS
# ===============================
# Diretorio onde os arquivos serao salvos (relativo ao diretorio de execucao)
app.upload-dir=${UPLOAD_DIR:uploads}
# URL base da API (usada para gerar o link publico da imagem)
app.base-url=${APP_BASE_URL:http://localhost:8080}

# Limite de tamanho de upload (5 MB)
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=6MB