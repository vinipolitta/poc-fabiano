spring.application.name=cadastroFabiano

spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# ===============================
# FLYWAY
# ===============================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ===============================
# JWT
# ===============================
# ATENCAO: fallback apenas para dev local. Em producao, JWT_SECRET DEVE ser definido via variavel de ambiente.
jwt.secret=${JWT_SECRET:MinhaChaveSuperSecretaMuitoForte123456}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ===============================
# CORS
# ===============================
# Em producao, defina CORS_ALLOWED_ORIGINS com a URL do seu frontend
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200}